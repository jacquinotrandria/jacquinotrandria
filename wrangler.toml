# Cloudflare Workers Static Assets — configuration wrangler
# Doc : https://developers.cloudflare.com/workers/static-assets/

# Nom du Worker tel que configuré dans le Cloudflare Dashboard
name = "jacquinot-randria"
compatibility_date = "2024-01-01"

# Static assets directory (output Vite)
[assets]
directory = "./dist"
# Renvoie index.html pour toutes les routes inconnues (SPA React Router)
not_found_handling = "single-page-application"
